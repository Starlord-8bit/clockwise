name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      device_url:
        description: 'Device URL (e.g. http://192.168.1.212)'
        required: true
        default: 'http://192.168.1.212'
  push:
    paths:
      - 'tests/**'
      - 'firmware/lib/cw-commons/**'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Only run automatically if CW_DEVICE_URL secret is set
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CW_DEVICE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests
        env:
          CW_DEVICE_URL: ${{ inputs.device_url || vars.CW_DEVICE_URL || 'http://192.168.1.212' }}
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
