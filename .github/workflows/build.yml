name: Build & Test

on:
  push:
    paths-ignore:
      - '**.md'
      - 'clockfaces/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'clockfaces/**'

jobs:
  build:
    name: ESP-IDF Build (${{ matrix.idf_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - v4.4.7   # current stable used by OG Clockwise
          - v5.2.1   # latest stable

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: esp32
          command: idf.py build

      - name: Upload firmware artifact
        if: github.ref == 'refs/heads/main' && matrix.idf_version == 'v4.4.7'
        uses: actions/upload-artifact@v4
        with:
          name: clockwise-paradise-firmware
          path: |
            build/clockwise-paradise.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          if-no-files-found: warn
          retention-days: 30

  # Run native unit tests (no hardware needed)
  test-native:
    name: Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get install -y cmake ninja-build

      - name: Build and run native tests
        run: |
          if [ -d "firmware/test/test_native" ]; then
            cd firmware/test/test_native
            cmake -B build -DCMAKE_BUILD_TYPE=Debug
            cmake --build build
            ./build/test_native || true
          else
            echo "No native tests found — skipping"
          fi
